<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Business Login Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f4;
            margin: 0;
        }
        
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        
        a {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            color: white;
            background-color: #3897f0;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        
        a:hover {
            background-color: #2e75c2;
        }
        
        #profile {
            margin-top: 20px;
            font-size: 14px;
            color: #333;
        }
    </style>
</head>


<script>
(function () {
  // ----- configure aqui (ou injete do seu build / env) -----
  var FACEBOOK_APP_ID = '1249819229008072';
  var REDIRECT_URI = 'https://api-sandbox.moneri.com.br/v1/instagram-scrapper/auth/facebook/program/callback';
  var PROGRAM_ID = 'PR788906'; // _id do Program no Mongo
  var AFTER_LOGIN_URL = 'https://APP-SANDBOX.moneri.com.br/seu-path'; // opcional; host deve ser permitido (moneri.com.br / lista no .env)

  var SCOPE =
    'instagram_basic,instagram_manage_insights,pages_show_list,pages_read_engagement';

  // Igual ao backend: JSON → base64 → encodeURIComponent(state)
  function encodeProgramOAuthState(programId, redirectFrontUrl) {
    var payload = { programId: programId };
    if (redirectFrontUrl) payload.redirectFrontUrl = redirectFrontUrl;
    var json = JSON.stringify(payload);
    var base64 = btoa(unescape(encodeURIComponent(json)));
    return encodeURIComponent(base64);
  }

  function buildOAuthUrl() {
    var params = new URLSearchParams({
      client_id: FACEBOOK_APP_ID,
      redirect_uri: REDIRECT_URI,
      response_type: 'code',
      scope: SCOPE,
      state: encodeProgramOAuthState(PROGRAM_ID, AFTER_LOGIN_URL || undefined),
    });
    return (
      'https://www.facebook.com/v22.0/dialog/oauth?' + params.toString()
    );
  }

  document.addEventListener('DOMContentLoaded', function () {
    var link = document.getElementById('fb-program-oauth-link');
    if (link) link.href = buildOAuthUrl();
  });
})();
</script>

<body>
    <div class="container">
        <h2>Teste Login Business Instagram</h2>
        <p id="profile">Faça login para visualizar seu perfil.</p>

            <!-- Facebook Login (Program / parceiro → Program.credentials.instagram) -->
<div id="fb-program-oauth-root">
  <a id="fb-program-oauth-link" href="#">Log in with Facebook Business</a>
</div>

    </div>
</body>

</html>
